<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FestPass Organizer - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "sm": "8px",

<style>
        body { background-color: #F4F3FB; }
        .gradient-btn { background: linear-gradient(135deg, #6a5cf6 0%, #00c9a7 100%); }
        .gradient-btn:hover { background: linear-gradient(135deg, #5c50df 0%, #00b596 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<!-- Login Container -->
<main class="w-full max-w-[440px] bg-white rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04),0_1px_3px_rgb(0,0,0,0.02)] border border-outline-variant/30 overflow-hidden relative">
<!-- Subtle top gradient accent -->
<div class="h-1 w-full bg-gradient-to-r from-[#6a5cf6] to-[#00c9a7]"></div>
<div class="p-8 sm:p-10">
<!-- Brand / Logo -->
<div class="flex items-center justify-center gap-3 mb-8">
<div class="w-10 h-10 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined text-[24px]">hexagon</span>
</div>
<h1 class="font-h1 text-h1 text-on-surface">FestPass</h1>
</div>
<!-- Headers -->
<div class="text-center mb-8">
<h2 class="font-h2 text-h2 text-on-surface mb-2">Welcome back</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Enter your credentials to access your dashboard</p>
</div>
<!-- Form -->
<form action="overview.html" class="" method="GET"><!-- Email Field Group -->
<div class="mb-6">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 uppercase tracking-wide" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-outline-variant rounded-lg bg-surface-container-low text-on-surface focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-shadow placeholder:text-outline/70 border-[1.5px]" id="email" name="email" placeholder="name@company.com" required="" style="font-family: 'DM Sans', sans-serif; font-size: 15px;" type="email"/>
</div>
</div>
<!-- UID Field Group -->
<div class="mb-6">
<label class="block font-label-sm text-label-sm text-on-surface-variant mb-2 uppercase tracking-wide" for="uid">UID</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">fingerprint</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-outline-variant rounded-lg bg-surface-container-low text-on-surface focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-shadow placeholder:text-outline/70 border-[1.5px]" id="uid" name="uid" placeholder="ORG-12345" required="" style="font-family: 'DM Sans', sans-serif; font-size: 15px;" type="text"/>
</div>
</div>
<!-- Password Field Group -->
<div class="mb-8">
<div class="flex items-center justify-between mb-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wide" for="password">Password</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-variant transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 border border-outline-variant rounded-lg bg-surface-container-low text-on-surface focus:ring-2 focus:ring-primary-container/50 focus:border-primary-container transition-shadow placeholder:text-outline/70 border-[1.5px]" id="password" name="password" placeholder="••••••••" required="" style="font-family: 'DM Sans', sans-serif; font-size: 15px;" type="password"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer text-outline hover:text-on-surface-variant transition-colors">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</div>
</div>
</div>
<!-- Submit Button -->
<button class="w-full gradient-btn text-white font-h3 text-h3 py-3 px-4 rounded-lg flex items-center justify-center gap-2 hover:scale-[0.98] transition-all duration-200 shadow-sm" type="submit">
  Sign in to Dashboard
  <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button></form>
<!-- Divider -->
<div class="mb-6 flex items-center">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="flex-shrink-0 mx-4 font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Or continue with</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Social Login -->
<button class="w-full bg-white border border-outline-variant text-on-surface font-h3 text-h3 py-2.5 px-4 rounded-lg flex items-center justify-center gap-3 hover:bg-surface-container-low transition-colors shadow-sm" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Continue with Google
            </button>
</div>
<!-- Footer area -->
<div class="bg-surface-container-low border-t border-outline-variant/30 p-5 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                New to FestPass? 
                <a class="font-h3 text-body-md text-primary hover:text-primary-fixed-variant transition-colors ml-1" href="#">Become an Organizer</a>
</p>
</div>
</main>
<!-- Navigation Shell Logic - Suppressed as per semantic shell mandate for login/transactional screens -->
</body></html>
